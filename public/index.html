<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PermitFlow PRO | Industrial Compliance</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5973/5973800.png">
    <script src="./auth.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --coal: #0a0a0b;
            --steel: #1a1a1e;
            --electric-blue: #00f2ff;
            --hazard-yellow: #facc15;
            --alert-red: #ef4444;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--coal);
            color: #e2e8f0;
            overflow-x: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass {
            background: rgba(26, 26, 30, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .industrial-card {
            background: linear-gradient(145deg, #16161a, #0d0d0f);
            border: 1px solid #2d2d35;
            box-shadow: 10px 10px 20px #050505, -10px -10px 20px #0f0f12;
        }
        .pulse-red {
            animation: pulse-red-border 2s infinite;
        }
        @keyframes pulse-red-border {
            0% { border-color: #ef4444; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { border-color: #7f1d1d; box-shadow: 0 0 20px 10px rgba(239, 68, 68, 0); }
            100% { border-color: #ef4444; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .pulse-green-seal {
            animation: pulse-green-seal 2s infinite;
        }
        @keyframes pulse-green-seal {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .success-overlay {
            background: rgba(10, 10, 11, 0.9);
            backdrop-filter: blur(20px);
        }
        .scanning-line {
            width: 100%;
            height: 2px;
            background: var(--electric-blue);
            box-shadow: 0 0 15px var(--electric-blue);
            position: absolute;
            top: 0;
            animation: scan 2.5s ease-in-out infinite;
        }
        @keyframes scan {
            0%, 100% { top: 0%; }
            50% { top: 100%; }
        }
        .history-item::before {
            content: '';
            position: absolute;
            left: -1px;
            top: 0;
            height: 100%;
            width: 2px;
            background: #2d2d35;
        }
        .history-item.pass::before { background: #22c55e; }
        .history-item.fail::before { background: #ef4444; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--steel); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .toast-glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .skeleton {
            background: linear-gradient(90deg, #1a1a1e 25%, #2d2d35 50%, #1a1a1e 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .side-drawer {
            background: rgba(13, 13, 15, 0.8) !important;
            backdrop-filter: blur(20px) !important;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: -20px 0 50px rgba(0, 0, 0, 0.5);
        }

        .bg-industrial-grid {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.02) 1px, transparent 0);
            background-size: 40px 40px;
        }

        .fat-input {
            background: rgba(255,255,255,0.03);
            border: 2px solid rgba(255,255,255,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fat-input:focus {
            border-color: #06b6d4;
            background: rgba(6,182,212,0.05);
            box-shadow: 0 0 20px rgba(6,182,212,0.1);
            outline: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        function App() {
            // Safe access to FramerMotion
            const motion = window.FramerMotion ? window.FramerMotion.motion : ({div: 'div'}); 
            const AnimatePresence = window.FramerMotion ? window.FramerMotion.AnimatePresence : ({children}) => children;

            const [audits, setAudits] = useState(() => {
                const saved = localStorage.getItem('permitflow_audits');
                return saved ? JSON.parse(saved) : [];
            });
            const [selectedImage, setSelectedImage] = useState(null);
            const [preview, setPreview] = useState(null);
            const [status, setStatus] = useState('idle'); // idle, scanning, analyzing, completed
            const [currentResult, setCurrentResult] = useState(null);
            const [toast, setToast] = useState(null);
            const [debugLog, setDebugLog] = useState([]);
            const [showSuccessOverlay, setShowSuccessOverlay] = useState(false);
            const [pdfGenerated, setPdfGenerated] = useState(false);
            const [activeView, setActiveView] = useState('dashboard'); // dashboard or gallery
            const [galleryLogs, setGalleryLogs] = useState([]);
            const [galleryLoading, setGalleryLoading] = useState(false);
            const [galleryFilter, setGalleryFilter] = useState('ALL'); // ALL, APPROVED, REJECTED
            const [gallerySearch, setGallerySearch] = useState('');
            const [selectedAudit, setSelectedAudit] = useState(null);
            const [userData, setUserData] = useState({ email: null, credits_remaining: 10, is_subscription_required: false });
            const [showPaywall, setShowPaywall] = useState(false);
            const [user, setUser] = useState(window.PermitFlowAuth ? window.PermitFlowAuth.user : null);
            const [loginEmail, setLoginEmail] = useState('');
            const [authLoading, setAuthLoading] = useState(false);
            const [magicSent, setMagicSent] = useState(false);
            const [hasScannedAnonymously, setHasScannedAnonymously] = useState(localStorage.getItem('pf_anon_scan') === 'true');
            const [showBlurredOverlay, setShowBlurredOverlay] = useState(false);
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [pendingSyncs, setPendingSyncs] = useState(0);

            // --- Hook logic moved inside App for scope safety ---
            const [isLocked, setIsLocked] = useState(false);
            const [cooldownRemaining, setCooldownRemaining] = useState(0);

            useEffect(() => {
                let timer;
                if (cooldownRemaining > 0) {
                    timer = setInterval(() => {
                        setCooldownRemaining(prev => Math.max(0, prev - 1));
                    }, 1000);
                } else {
                    setIsLocked(false);
                }
                return () => clearInterval(timer);
            }, [cooldownRemaining]);

            const triggerCooldown = (seconds) => {
                setIsLocked(true);
                setCooldownRemaining(seconds);
            };

            const fetchUserData = useCallback(async () => {
                if (!user) return;
                try {
                    const response = await fetch(`/user?email=${user.email}`);
                    const data = await response.json();
                    setUserData(data);
                    if (data.is_subscription_required) {
                        setShowPaywall(true);
                    }
                } catch (error) {
                    console.error("Failed to fetch user data", error);
                }
            }, [user]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setAuthLoading(true);
                try {
                    // Simulation for Vibe code
                    const res = await window.PermitFlowAuth.login(loginEmail);
                    setMagicSent(true);
                    setToast({ message: res.message, type: "info" });
                    
                    // Auto-verify for demo convenience (Vibe check)
                    setTimeout(async () => {
                        const newUser = await window.PermitFlowAuth.verify(loginEmail);
                        setUser(newUser);
                        setAuthLoading(false);
                    }, 2000);
                } catch (err) {
                    setToast({ message: "Auth failed. Try again.", type: "error" });
                    setAuthLoading(false);
                }
            };

            const handleGoogleLogin = async () => {
                setAuthLoading(true);
                try {
                    const res = await window.PermitFlowAuth.signInWithGoogle();
                    // Simulate redirect and return with user (Vibe check)
                    setTimeout(async () => {
                        const newUser = await window.PermitFlowAuth.verify('google-pro-contractor@gmail.com');
                        setUser(newUser);
                        setAuthLoading(false);
                        setShowBlurredOverlay(false);
                    }, 1500);
                } catch (err) {
                    setToast({ message: "Google Auth Failed", type: "error" });
                    setAuthLoading(false);
                }
            };

            const handleOnline = useCallback(() => {
                setIsOffline(false);
                setToast({ message: "Back online. Syncing records...", type: "info" });
                setTimeout(() => setPendingSyncs(0), 2000);
            }, [setToast, setIsOffline, setPendingSyncs]);

            const handleOffline = useCallback(() => setIsOffline(true), [setIsOffline]);

            useEffect(() => {
                fetchUserData();
                
                // --- Supabase Realtime Sync (Vibe) ---
                let accountSubscription;
                if (user && user.email) {
                    console.log(`[Realtime] Subscribing to user account for ${user.email}`);
                    accountSubscription = window.PermitFlowAuth.supabase
                        .channel('user-account-changes')
                        .on(
                            'postgres_changes', 
                            { 
                                event: 'UPDATE', 
                                schema: 'public', 
                                table: 'user_account',
                                filter: `email=eq.${user.email}` 
                            }, 
                            (payload) => {
                                console.log('[Realtime] Account Updated:', payload.new);
                                const newAccount = payload.new;
                                setUserData(newAccount);
                                
                                // Auto-hide paywall on upgrade
                                if (newAccount.is_pro) {
                                    setShowPaywall(false);
                                    setToast({ message: "PRO STATUS ACTIVE! Unlimited Audits Unlocked.", type: "success" });
                                    if (window.confetti) {
                                        window.confetti({
                                            particleCount: 200,
                                            spread: 80,
                                            origin: { y: 0.6 }
                                        });
                                    }
                                }
                            }
                        )
                        .subscribe();
                }

                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);

                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', () => {
                        navigator.serviceWorker.register('./sw.js').then(reg => {
                            console.log('SW registered:', reg);
                        }).catch(err => {
                            console.log('SW failed:', err);
                        });
                    });
                }
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                    if (accountSubscription) {
                        window.PermitFlowAuth.supabase.removeChannel(accountSubscription);
                    }
                };
            }, [fetchUserData, user, handleOnline, handleOffline]);

            useEffect(() => {
                localStorage.setItem('permitflow_audits', JSON.stringify(audits));
            }, [audits]);

            const fetchGalleryLogs = useCallback(async () => {
                setGalleryLoading(true);
                try {
                    const params = new URLSearchParams();
                    params.append('email', user.email);
                    if (galleryFilter !== 'ALL') params.append('status', galleryFilter);
                    if (gallerySearch) params.append('search', gallerySearch);
                    
                    const response = await fetch(`/logs?${params.toString()}`);
                    const data = await response.json();
                    setGalleryLogs(data);
                } catch (error) {
                    setToast({ message: "Failed to fetch gallery records", type: "error" });
                } finally {
                    setGalleryLoading(false);
                }
            }, [galleryFilter, gallerySearch]);

            useEffect(() => {
                if (activeView === 'gallery') {
                    fetchGalleryLogs();
                }
            }, [activeView, fetchGalleryLogs]);

            const handleFileUpload = (e) => {
                if (userData.is_subscription_required) {
                    setShowPaywall(true);
                    return;
                }
                const file = e.target.files[0];
                if (file) {
                    setSelectedImage(file);
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        setPreview(e.target.result);
                        if (isOffline) {
                            setPendingSyncs(prev => prev + 1);
                            setToast({ message: "Offline. Photo captured & cached for sync.", type: "warning" });
                            setStatus('completed');
                            setCurrentResult({
                                model: "OFFLINE-CAPTURE-" + Date.now().toString().slice(-4),
                                seer2: "PENDING",
                                status: "CACHED",
                                verification_id: "SYNC-PENDING",
                                is_compliant: true,
                                gps: "Cached GPS Data",
                                timestamp: new Date().toLocaleTimeString(),
                                code_section: "Waiting for connection..."
                            });
                        } else {
                            handleManualTrigger();
                        }
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleManualTrigger = async (manualSeer = null) => {
                if (!user && hasScannedAnonymously) {
                    setToast({ message: "Limit reached. Sign in to save audits.", type: "warning" });
                    return;
                }
                if (user && userData.is_subscription_required) {
                    setShowPaywall(true);
                    return;
                }
                if (isLocked) return;
                startAuditFlow(manualSeer);
            };

            const startAuditFlow = async (manualSeer = null) => {
                // --- Loading Boundary & Waking up State ---
                setStatus('scanning');
                setToast({ message: "Waking up Truth Engine... (Initializing 2026 CEC Reference)", type: "info" });
                await new Promise(r => setTimeout(r, 2000));
                
                setStatus('analyzing');
                setToast({ message: "Vision Agent: Analyzing Nameplate OCR-Text...", type: "info" });
                await new Promise(r => setTimeout(r, 1500));

                // Simulation: Backend call with rate limit check
                // In a real app, this would be an actual fetch reaching the MCP server
                const mockBackendCall = async () => {
                    // 15% chance to simulate a cold server tool error
                    if (Math.random() < 0.15) {
                        return { status: "error", code: "COLD_BOOT", message: "Truth Engine is cold. Waking up..." };
                    }
                    return { is_rate_limited: false, data: {} };
                };

                const response = await mockBackendCall();
                setDebugLog(prev => [{t: new Date().toLocaleTimeString(), d: response}, ...prev].slice(0, 5));
                
                // --- Cold Boot Handling ---
                if (response.status === "error" && response.code === "COLD_BOOT") {
                    setToast({ message: "Truth Engine Cold Boot Detected... Re-initializing.", type: "warning" });
                    await new Promise(r => setTimeout(r, 3000));
                    // Recursive retry or just tell user to wait
                    setToast({ message: "Engine Ready. Please re-trigger scan.", type: "info" });
                    setStatus('idle');
                    return;
                }

                // If the server returned a cooldown
                if (response.is_rate_limited) {
                    setToast({
                        message: "Syncing with 2026 CEC Database... Please wait 10s for verification.",
                        type: "warning"
                    });
                    triggerCooldown(10);
                    setStatus('idle');
                    return;
                }

                // Simulated Gemini 3.1 Pro Extraction
                const extracted = {
                    id: Date.now(),
                    timestamp: new Date().toLocaleTimeString(),
                    model: manualSeer ? "MANUAL-OVERRIDE-TEMP" : "58SB0A070E17--12",
                    seer2: manualSeer !== null ? parseFloat(manualSeer) : (Math.random() > 0.5 ? 16.2 : 13.5),
                    type: manualSeer ? "Manual Test Input" : "Air Conditioner (Split)"
                };

                // Integration with @permitflow-engine logic
                const compliance = extracted.seer2 >= 15.0;
                
                // Track usage & Save to DB
                let verification_id = `PF-${Math.floor(1000 + Math.random() * 9000)}`;
                try {
                    const saveResponse = await fetch('/logs', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user_email: user.email,
                            equipment_type: extracted.type,
                            seer2: extracted.seer2,
                            status: compliance ? 'APPROVED' : 'REJECTED'
                        })
                    });
                    const saveData = await saveResponse.json();
                    if (saveData.verification_id) {
                        verification_id = saveData.verification_id;
                    }
                    await fetchUserData(); // Refresh credits
                } catch (err) {
                    console.error("Failed to save log to backend", err);
                }

                const finalResult = {
                    ...extracted,
                    user_email: user ? user.email : "anonymous@permitflow.pro",
                    verification_id: verification_id,
                    is_compliant: compliance,
                    status: compliance ? 'APPROVED' : 'REJECTED',
                    violation: compliance ? null : `SEER2 ${extracted.seer2} fails 2026 CEC baseline (min 15.0)`,
                    code_section: "Title 24, Part 6, Section 150.1(c)",
                    gps: "34.0522° N, 118.2437° W" // Los Angeles
                };

                setCurrentResult(finalResult);
                setStatus('completed');
                
                if (!user) {
                    setHasScannedAnonymously(true);
                    localStorage.setItem('pf_anon_scan', 'true');
                    setShowBlurredOverlay(true);
                }

                if (compliance) {
                    confetti({
                        particleCount: 150,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#00f2ff', '#facc15', '#22c55e']
                    });
                }

                setCurrentResult(finalResult);
                setAudits(prev => [finalResult, ...prev].slice(0, 10)); 
                setStatus('completed');
                
                if (compliance) {
                    setShowSuccessOverlay(true);
                }
                
                // Trigger global cooldown after successful scan to enforce 1/10s
                triggerCooldown(10);
            };

            const downloadCertificate = async () => {
                const element = document.getElementById('certificate-template');
                element.style.display = 'block';
                
                // Keep UI locked while generating
                triggerCooldown(10); 
                
                const canvas = await html2canvas(element, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff'
                });
                
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const imgProps = pdf.getImageProperties(imgData);
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
                
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(`Compliance_Certificate_${currentResult.model}.pdf`);
                
                element.style.display = 'none';
                setPdfGenerated(true);
                setToast({ message: "Certificate Generated & Validated", type: "success" });
            };

            const copyShareLink = (id) => {
                const link = `${window.location.origin}/verify/${id}`;
                navigator.clipboard.writeText(link);
                setToast({ message: "Verification link copied to clipboard", type: "info" });
            };

            const reset = () => {
                setPreview(null);
                setCurrentResult(null);
                setStatus('idle');
                setShowSuccessOverlay(false);
                setPdfGenerated(false);
            };

            if (!user) {
                return (
                    <div className="min-h-screen bg-[#0a0a0b] bg-industrial-grid flex items-center justify-center p-6 relative overflow-hidden">
                        {/* Background Decor */}
                        <div className="absolute top-0 left-1/4 w-96 h-96 bg-cyan-500/10 blur-[150px] rounded-full"></div>
                        <div className="absolute bottom-0 right-1/4 w-96 h-96 bg-cyan-500/5 blur-[120px] rounded-full"></div>

                        <motion.div 
                            initial={{ opacity: 0, y: 30 }}
                            animate={{ opacity: 1, y: 0 }}
                            className="max-w-md w-full relative z-10"
                        >
                            <div className="mb-12 text-center">
                                <div className="w-16 h-16 bg-cyan-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(6,182,212,0.3)]">
                                    <span className="text-2xl font-black text-black italic leading-none">PF</span>
                                </div>
                                <h1 className="text-4xl font-black text-white tracking-tighter uppercase mb-2">PermitFlow <span className="text-cyan-400">PRO</span></h1>
                                <p className="text-slate-500 font-bold uppercase tracking-[0.3em] text-[10px]">Industrial Compliance Gateway</p>
                            </div>

                            <form onSubmit={handleLogin} className="industrial-card p-10 rounded-[40px] border-white/5 bg-black/40 backdrop-blur-md">
                                <div className="mb-8 text-center">
                                    <h2 className="text-xl font-bold text-white mb-2 uppercase tracking-tight">Contractor Access</h2>
                                    <p className="text-[10px] text-slate-500 uppercase font-black tracking-widest">Magic Link Verification</p>
                                </div>

                                <div className="space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] text-slate-600 font-bold uppercase tracking-widest ml-1">Email Address</label>
                                        <input 
                                            type="email"
                                            required
                                            placeholder="you@hvac-company.com"
                                            value={loginEmail}
                                            onChange={(e) => setLoginEmail(e.target.value)}
                                            className="w-full fat-input p-6 rounded-2xl text-white font-bold text-lg focus:placeholder-transparent"
                                        />
                                    </div>

                                    <button 
                                        type="submit"
                                        disabled={authLoading}
                                        className="w-full py-6 bg-cyan-500 text-black font-black text-xs uppercase tracking-[0.2em] rounded-2xl hover:bg-cyan-400 transition-all active:scale-[0.98] shadow-[0_10px_30px_rgba(6,182,212,0.2)] flex items-center justify-center gap-3 group"
                                    >
                                        {authLoading ? (
                                            <div className="w-5 h-5 border-3 border-black border-t-transparent rounded-full animate-spin"></div>
                                        ) : (
                                            <>
                                                <span>Send Login Link</span>
                                                <svg className="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                                            </>
                                        )}
                                    </button>

                                    <div className="relative py-4 flex items-center">
                                        <div className="flex-grow border-t border-white/5"></div>
                                        <span className="flex-shrink mx-4 text-[9px] text-slate-700 font-black uppercase tracking-widest">or</span>
                                        <div className="flex-grow border-t border-white/5"></div>
                                    </div>

                                    <button 
                                        type="button"
                                        onClick={handleGoogleLogin}
                                        disabled={authLoading}
                                        className="w-full py-5 bg-white text-black font-black text-xs uppercase tracking-[0.2em] rounded-2xl hover:bg-slate-200 transition-all active:scale-[0.98] flex items-center justify-center gap-3"
                                    >

                                    initial={{ scale: 0.9, y: 20 }}
                                    animate={{ scale: 1, y: 0 }}
                                    exit={{ scale: 0.9, y: 20 }}
                                    className="max-w-md w-full industrial-card p-10 rounded-[32px] border-cyan-500/30 text-center relative overflow-hidden"
                                >
                                    {/* Decoration */}
                                    <div className="absolute top-0 left-1/2 -translate-x-1/2 w-64 h-64 bg-cyan-500/10 blur-[100px] rounded-full pointer-events-none"></div>
                                    
                                    <div className="w-20 h-20 bg-cyan-500/20 rounded-3xl flex items-center justify-center mx-auto mb-8 border border-cyan-500/30 rotate-12">
                                        <svg className="w-10 h-10 text-cyan-400 -rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                                    </div>

                                    <h2 className="text-3xl font-black text-white mb-4 tracking-tighter uppercase">Upgrade to PRO</h2>
                                    <p className="text-slate-400 mb-8 text-sm leading-relaxed">
                                        Don't risk a Title 24 violation. Get <span className="text-white font-bold">unlimited audits</span> and <span className="text-white font-bold">PDF certificates</span> for <span className="text-cyan-400 font-bold">$99/mo</span>.
                                    </p>

                                    <div className="space-y-4 mb-8">
                                        {[
                                            "Unlimited Compliance Scans",
                                            "Export Official Certificates",
                                            "Client Audit Gallery Access",
                                            "Offline Mode & Native PWA"
                                        ].map((feature, i) => (
                                            <div key={i} className="flex items-center gap-3 text-xs text-slate-300 font-bold uppercase tracking-widest text-left px-4">
                                                <svg className="w-4 h-4 text-green-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M5 13l4 4L19 7"/></svg>
                                                {feature}
                                            </div>
                                        ))}
                                    </div>

                                    <button 
                                        onClick={() => {
                                            // Paddle passthrough vibe with user_id
                                            console.log(`[Paddle] Checkout for ${user.email} (ID: ${user.id})`);
                                            window.open(`https://buy.paddle.com/99-pro?email=${user.email}&passthrough=${user.id}`, '_blank');
                                        }}
                                        className="w-full py-4 bg-cyan-500 text-black font-black text-xs uppercase tracking-[0.2em] rounded-2xl hover:bg-cyan-400 mb-4 transition-all"
                                    >
                                        Subscribe via Paddle
                                    </button>

                                    {!userData.is_subscription_required && (
                                        <button 
                                            onClick={() => setShowPaywall(false)}
                                            className="text-[10px] text-slate-600 font-bold uppercase tracking-widest hover:text-white transition-colors"
                                        >
                                            Continue with {userData.credits_remaining} Free Records
                                        </button>
                                    )}
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
    </style>
</body>
</html>
